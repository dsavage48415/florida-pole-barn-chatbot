<!--
  Florida Pole Barn AI Chatbot — WordPress Embed Snippet
  ======================================================

  Instructions:
  1. In WordPress, go to the Resources page (floridapolebarn.com/resources/)
  2. Edit the page with Elementor
  3. Add an "HTML" widget (or use Theme > Custom Code > Footer)
  4. Paste the script tag below
  5. Save and publish

  The chatbot will appear as a floating blue bubble in the bottom-right corner.
  Users can click it to open the chat and ask pole barn construction questions.

  Configuration:
  - data-fpb-chatbot    : Required marker attribute
  - data-api-url        : Optional override for API base URL
-->

<!-- Florida Pole Barn AI Chatbot -->
<script
  src="https://fpb-chatbot.vercel.app/widget.js"
  defer
  data-fpb-chatbot
></script>
