<!--
  Florida Pole Barn AI Chatbot — WordPress Embed Snippet
  ======================================================

  Instructions:
  1. In WordPress, go to the Resources page (floridapolebarn.com/resources/)
  2. Edit the page with Elementor
  3. Add an "HTML" widget where you want the chatbot to appear
  4. Paste the code below into the HTML widget
  5. Save and publish

  The chatbot will appear inline as a ChatGPT-style chat section
  embedded directly in the page content. It does NOT conflict
  with the existing Tidio/HubSpot floating widget.

  Configuration:
  - data-fpb-chatbot-embed : Marker for inline embed mode
  - data-target            : ID of the container element (default: fpb-chatbot)
  - data-height            : Custom height (default: 600px)
  - data-api-url           : Optional override for API base URL
-->

<!-- Florida Pole Barn AI Chatbot (Inline Embed) -->
<div id="fpb-chatbot" style="max-width: 900px; margin: 40px auto;"></div>
<script
  src="https://florida-pole-barn-chatbot.vercel.app/widget.js"
  defer
  data-fpb-chatbot-embed
  data-target="fpb-chatbot"
></script>
